apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - http-to-https-redirect.yaml

patches:
  - target:
      group: gateway.networking.k8s.io
      version: v1
      kind: Gateway
      name: gateway
      namespace: istio-ingress
    patch: |
      - op: add
        path: /spec/listeners/-
        value:
          name: https
          hostname: "*.kube.local"
          port: 443
          protocol: HTTPS
          tls:
            mode: Terminate
            certificateRefs:
              - kind: Secret
                name: wildcard-kube-local-tls
          allowedRoutes:
            namespaces:
              from: All
      - op: replace
        path: /spec/listeners/0/allowedRoutes/namespaces/from
        value: Same
