apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      group: gateway.networking.k8s.io
      version: v1
      kind: Gateway
      name: gateway
      namespace: istio-ingress
    patch: |
      - op: replace
        path: /spec/listeners/0/hostname
        value: "*.spacefluff.com"
