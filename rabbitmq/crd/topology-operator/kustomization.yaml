---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://github.com/rabbitmq/messaging-topology-operator/releases/download/v1.18.3/messaging-topology-operator-with-certmanager.yaml
# Remove the Namespace resource since it's already defined by the cluster-operator
patches:
  - target:
      kind: Namespace
      name: rabbitmq-system
    patch: |-
      apiVersion: v1
      kind: Namespace
      metadata:
        name: rabbitmq-system
      $patch: delete
